services:
  db:
    image: postgres:16-alpine
    container_name: schulerpark-db
    environment:
      POSTGRES_DB: schulerpark
      POSTGRES_USER: schulerpark
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schulerpark"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: schulerpark-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    container_name: schulerpark-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=schulerpark;Username=schulerpark;Password=${DB_PASSWORD:-changeme}"
      Jwt__Secret: "${JWT_SECRET:-CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_AT_LEAST_32_CHARS}"
      AzureAd__TenantId: "${AZURE_AD_TENANT_ID}"
      AzureAd__ClientId: "${AZURE_AD_CLIENT_ID}"
      AzureAd__ClientSecret: "${AZURE_AD_CLIENT_SECRET}"
      Smtp__Host: "${SMTP_HOST:-mailhog}"
      Smtp__Port: "${SMTP_PORT:-1025}"
      Smtp__Username: "${SMTP_USERNAME}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-noreply@schulerpark.local}"
      ASPNETCORE_ENVIRONMENT: Development

volumes:
  postgres_data:
