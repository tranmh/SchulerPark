services:
  db:
    image: postgres:16-alpine
    container_name: louise-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: louise
      POSTGRES_USER: louise
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U louise"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
